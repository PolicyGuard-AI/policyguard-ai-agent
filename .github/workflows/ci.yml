# PolicyGuard AI - CI/CD Pipeline
name: CI/CD

on:
  push:
    branches: [main, develop, development]
    tags: ['v*']
  pull_request:
    branches: [main, develop, development]

env:
  PYTHON_VERSION: '3.14'

# Private policyguard-ai-core / policyguard-ai-logging: optional repo secret PIP_GITHUB_TOKEN.

jobs:
  # ════════════════════════════════════════════════════════════════
  # TEST
  # ════════════════════════════════════════════════════════════════
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PIP_GITHUB_TOKEN: ${{ secrets.PIP_GITHUB_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          TOKEN="${PIP_GITHUB_TOKEN:-$GITHUB_TOKEN}"
          if [ -n "$TOKEN" ]; then
            git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"
          fi
          pip install -e ".[dev]"

      - name: Run linting
        run: |
          pip install ruff
          ruff check src/

      - name: Run tests
        run: |
          pytest tests/ -v --cov=policyguard_ai_agent --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ════════════════════════════════════════════════════════════════
  # BUILD & PUBLISH PACKAGE
  # ════════════════════════════════════════════════════════════════
  publish:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
